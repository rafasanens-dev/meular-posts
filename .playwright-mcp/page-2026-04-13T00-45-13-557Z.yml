            - 'link "A closer look at the desert retreat of Justin Bieber. As Coachella Valley Music and Arts Festival takes over the valley, the real scene often shifts just minutes away, behind the gates of The Madison Club. This is where many of the artists, athletes, and insiders actually stay. Private estates, full staff, no crowds, yet still within reach of the festival when they choose to step into it. Bieber’s residence, acquired for around $16.6 million, sits within this ultra-exclusive enclave, offering nearly 10,000 square feet of indoor-outdoor living, a guesthouse, and resort-style amenities designed for the desert lifestyle. Beyond the home, Madison Club offers a members-only golf course, spa, and wellness facilities, creating a completely different Coachella experience, defined by privacy, comfort, and control. Two worlds, minutes apart. #madisonclub #residence #coachella #laquinta Carrossel" [ref=e596] [cursor=pointer]':
