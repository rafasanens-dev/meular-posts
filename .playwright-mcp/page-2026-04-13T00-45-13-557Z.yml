            - 'link "Today, we’re featuring the home of a champion. A place away from the spotlight, where focus is built long before wins like this. Rory McIlroy has secured his second consecutive victory at the Masters Tournament, finishing at 12-under-par and holding off Scottie Scheffler by a single stroke. With this win, he becomes just the fourth player in history to defend the green jacket, joining Tiger Woods, Jack Nicklaus, and Nick Faldo. Congratulations, @rorymcilroy #florida #masters #jupiter #golf Carrossel" [ref=e565] [cursor=pointer]':
              - /url: /luxury_listings/p/DXDVZM8lIQW/
              - 'img "Today, we’re featuring the home of a champion. A place away from the spotlight, where focus is built long before wins like this. Rory McIlroy has secured his second consecutive victory at the Masters Tournament, finishing at 12-under-par and holding off Scottie Scheffler by a single stroke. With this win, he becomes just the fourth player in history to defend the green jacket, joining Tiger Woods, Jack Nicklaus, and Nick Faldo. Congratulations, @rorymcilroy #florida #masters #jupiter #golf" [ref=e568]'
