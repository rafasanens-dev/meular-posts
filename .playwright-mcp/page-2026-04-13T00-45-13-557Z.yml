            - 'link "As Sabrina Carpenter takes the stage as one of the headliners at Coachella Valley Music and Arts Festival, this is the home that set the tone behind the scenes. Featured in her “House Tour” music video, this $36,800,000 Hollywood Hills estate feels more like a cinematic set than a residence. Spanning over 13,000 square feet, the home blends modern architecture with bold, high-glam interiors, from green onyx and volcanic stone to sculptural furniture and velvet-lined spaces. Floor-to-ceiling glass opens to sweeping city views, while a hidden speakeasy, statement living areas, and resort-style amenities create a setting designed for both performance and privacy. Listed at $36,800,000 by @williamsandwilliams #housetour #losangeles #coachella #sunset Carrossel" [ref=e577] [cursor=pointer]':
