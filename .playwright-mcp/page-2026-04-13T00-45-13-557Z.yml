            - 'link "Summer in Kelowna has a rhythm of its own. Mornings on the lake, long afternoons under the sun, and evenings that stretch just a little longer with good company. From hillside estates overlooking the Okanagan to private waterfront retreats, these homes are less about where you stay and more about how you spend your time. Boating, wine tastings, slow mornings, late dinners, everything feels a bit more intentional here. If you find yourself in Kelowna, connect with @restnestrentals They know these homes, and this lifestyle, better than anyone. #kelowna #vineyard #bc #canada Carrossel" [ref=e571] [cursor=pointer]':
              - /url: /luxury_listings/p/DXC9XgvEu4V/
              - 'img "Summer in Kelowna has a rhythm of its own. Mornings on the lake, long afternoons under the sun, and evenings that stretch just a little longer with good company. From hillside estates overlooking the Okanagan to private waterfront retreats, these homes are less about where you stay and more about how you spend your time. Boating, wine tastings, slow mornings, late dinners, everything feels a bit more intentional here. If you find yourself in Kelowna, connect with @restnestrentals They know these homes, and this lifestyle, better than anyone. #kelowna #vineyard #bc #canada" [ref=e574]'
